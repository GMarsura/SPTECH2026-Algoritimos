<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script defer>
        function clicar(){
            let valorInput1 = Number(input1.value);
            valorInput1 = valorInput1.toFixed(2);
            div_mensagem.innerHTML = `O valor do input é ${valorInput1}`;
        }
    </script>
</head>
<body>
    input1;
    <input type="text" id="input1">

    <br>

    <button onclick="clicar()">clique</button>

    <div id="div_mensagem"></div>
</body>
</html>
