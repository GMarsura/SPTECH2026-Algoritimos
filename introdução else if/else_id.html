<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script defer>
        function analizar(){
            let temperatura  = Number(input_temperatura.value);

            if(temperatura < 0 ){
                div_mensagem.innerHTML = `temperatura abaixo de 0`; 
            }
            
        }
    </script>
</head>
<body>
    

    Temperatura:
    <input type="text" id="input_temperatura">
    <button onclick="analizar()">analizar</button>
    <div id="div_mensagem"></div>
</body>
</html>
