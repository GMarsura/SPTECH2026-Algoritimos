<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script defer>
        function calcular(){
            let saldo = Number(ipt_saldo_conta.value);
            if(saldo == 0){
                div_mensagem.innerHTML = '<span style="color: black;">Conta zerada</span>'
            }
            if(saldo < 0){
                div_mensagem.innerHTML = '<span style="color: red;">Está devendo!</span>'
            }
            if(saldo > 0){
                div_mensagem.innerHTML = '<span style="color: blue;">Saldo positivo! sorriso</span>'
            }
        }
    </script>
</head>
<body>
    informe o valor de seu saldo na conta do banco:
    <input type="text" id="ipt_saldo_conta">

    <br>
    <button onclick="calcular()">verificar finanças</button>

    <br>
    <div id="div_mensagem"></div>
</body>
</html>
