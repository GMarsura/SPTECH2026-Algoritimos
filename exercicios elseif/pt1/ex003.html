<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script defer>
        function analizarDesempenho(){
            let n1 = Number(nota1.value);
            let n2 = Number(nota2.value);
            let n3 = Number(nota3.value);

            if((n1+n2+n3)/3 >= 9.4){
                div_mensagem.innerHTML = 'Parabéns, você é fora de série!'
            }
        }
    </script>
</head>
<body>
    Nota 1
    <input type="text" id="nota1">
    Nota 2
    <input type="text" id="nota2">
    Nota 3
    <input type="text" id="nota3">

    <button onclick="analizarDesempenho()">analizar desempenho</button>

    <div id="div_mensagem"></div>
</body>
</html>
