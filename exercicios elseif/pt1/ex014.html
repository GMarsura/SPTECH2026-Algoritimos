<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script defer>
        function analizarDesempenho(){
            let n1 = Number(nota1.value);
            let n2 = Number(nota2.value);
            

            if((n1+n2)/2 >= 6){
                alert('Parabéns, aprovado!')
            }else{
                alert('Tente outra vez...') 
            }
        }
    </script>
</head>
<body>
    Nota 1

    Nota 2
    <input type="text" id="nota2">
    

    <button onclick="analizarDesempenho()">verificar situação</button>

    
</body>
