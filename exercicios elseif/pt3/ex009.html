<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script defer>
       
       function verificar(){
            let peso = Number(id_peso.value);
            let altura = Number(id_altura.value);
            let imc = peso / (altura * altura);
            let mensagem = 'IMC inválido';

            if(imc < 18.5){
                mensagem = 'Abaixo do peso';
            } else if(imc >= 18.5 && imc <= 24.9){
                mensagem = 'Peso normal';
            }else if(imc >= 25 && imc <= 29.9){
                mensagem = 'Acima do peso';
            }else if(imc > 29.9){
                mensagem = 'Cuidado, risco de obesidade';
            }

            div_mensagem.innerHTML = `Seu IMC é ${imc.toFixed(2)} , ${mensagem}`;
        }
    </script>
</head>
<body>
    seu peso (kg):
    <input type="text" id="id_peso">
    <br>
    sua altura (m):
    <input type="text" id="id_altura">
    <br>
    <button onclick="verificar()">Calcular IMC</button>
    <br>
    <div id="div_mensagem"></div>
</body>
</html>
