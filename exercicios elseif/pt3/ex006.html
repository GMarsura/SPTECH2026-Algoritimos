<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script defer>
        function verificar(){
            let time = Number(id_select.value);
            let mensagem = '';

            /*
              "Salve o Corinthians" -> com fundo preto e letra branca, se for Corinthians 
   "Salve o alviverde imponente" -> com fundo verde e letra branca, se for Palmeiras 
   "Agora quem dá a bola é o Santos" -> com fundo branco e letra preta, se for Santos 
   "Salve o Tricolor paulista" -> com fundo preto e letra vermelha, se for São Paulo

*/


            if(time === 2){
                mensagem = '<span style="background-color: black; color: white;">Salve o Corinthians</span>';
            } else if(time === 3){
                mensagem = '<span style="background-color: white; color: black;">Agora quem dá a bola é o Santos</span>';
            }else if(time === 4){
                mensagem = '<span style="background-color: black; color: red;">Salve o Tricolor paulista</span>';
            }else if(time === 5){
                mensagem = '<span style="background-color: green; color: white;">Salve o alviverde imponente</span>';
            }else{
                mensagem = '<span>Time não encontrado</span>';
            }

            div_mensagem.innerHTML = mensagem;
        }
    </script>
</head>
<body>
    qual dos times abaixo voce torce
    <select name="" id="id_select">
        <option value="2">Palmeiras</option>
        <option value="3">Santos</option>
        <option value="4">São Paulo</option>
        <option value="5">Corinthians</option>
    </select>

    <br>
    <button onclick="verificar()">fale dobra esse time</button>
    <br>
    <div id="div_mensagem"></div>
</body>
</html>
