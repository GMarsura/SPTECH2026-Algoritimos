<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input id="bairro">
<button onclick="cad()">Cadastrar bairro</button>

<br><br>

<input id="num">
<button onclick="ver()">Relembrar moradia</button>

<p id="res3"></p>

<script>
let bairros = [];

function cad() {
    bairros.push(bairro.value);
}

function ver() {
    let n = num.value;

    if (n <= bairros.length) {
        res3.innerHTML = bairros[n - 1];
    } else {
        res3.innerHTML = "Você ainda não morou num " + n + "º bairro!";
    }
}
</script>
</body>
</html>
