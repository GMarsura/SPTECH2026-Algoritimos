<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script defer>
        function avaliar(){
            let nota = Number(id_notaAtendimento.value);
            let mensagem = '';
            if(nota < 0 || nota > 10){
                mensagem = 'nota invalida';
            } else if(nota < 5){
                mensagem = 'Não aprovado';
            } else if(nota > 6){
                mensagem = 'Aprovado';
            } else{
                mensagem = 'Neutro';
            }
            alert(mensagem);
        }
    </script>
</head>
<body>
    insira a nota do atendimento
    <input type="text" id="id_notaAtendimento">
    <button onclick="avaliar()">avaliar atendimento</button>
</body>
</html>
