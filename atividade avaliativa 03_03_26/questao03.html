<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h1>Calculadora SPFlix</h1>

  <div>
      <p>Qualidade (720p ou 1080p ou 4K):</p>
      <input type="text" id="ipt_qualidade">
  </div>

  <div style="display: flex; gap: 50px">
    <div>
      <p>Telas simultâneas - Na mesma casa:</p>
      <input type="text" id="ipt_qtd_telas">
    </div>

    <div>
      <p>Telas extras - Fora da residência:</p>
      <input type="text" id="ipt_qtd_telas_extras">
    </div>
  </div>

  <div>
    <p>Quer fazer download ('sim' ou 'nao'):</p>
    <input type="text" id="ipt_download">
  </div>

  <p></p>
  <button onclick="exibirResultado()">Exibir Resultado</button>

  <p></p>
  <div id="div_mensagem"></div>

</body>
</html>
<script>

function exibirResultado() {
  let qualidade = ipt_qualidade.value;

  let valorTelas = 0;
  let valorBase = 0;
  let valorFinal = 0;
  let qtd_telas = Number(ipt_qtd_telas.value);
  let qtd_telas_extras = Number(ipt_qtd_telas_extras.value);


  if(qualidade === '720p'){
    valorBase = 15
  
  }

  if(qualidade === '1080p'){
    valorBase = 20
  }

  if(qualidade === '4K'){
    valorBase = 25
  }

  

  if(qtd_telas <= 2){
    valorTelas += 10;
  }else{
    if(qtd_telas <= 4){
      valorTelas += 20
    }else{
      valorTelas +=30
    }
  }
  valorTelas += qtd_telas_extras * 12.90;

  valorFinal += valorBase + valorTelas;
  let valorIndividual = valorFinal/(qtd_telas+qtd_telas_extras)
  
  div_mensagem.innerHTML = 
  `
    O valor base do seu plano é R$${valorBase} <br>
    O valor das telas do seu plano é R$${valorTelas} <br>
    Valor final: R$${valorFinal} <br>
    Se quiser dividir fica R$${valorIndividual} para cada!
  `
  ;


}
</script>
