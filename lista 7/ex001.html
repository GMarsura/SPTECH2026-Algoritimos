<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script defer>
        function contar(){
            let i = 0;
            let mensagem = ``;
            while(i <= 15){
                mensagem += `${i} <br>`;
            }

            console.log(mensagem);
        }
    </script>
</head>
<body>
    <button onclick="contar()">contar</button>
    <div id="div_mensagem"></div>
</body>
</html>
