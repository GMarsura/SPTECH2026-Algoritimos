<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script defer>
        
        function contar() {
            
            for(let i = 0;i < 10; i++){
            div.innerHTML += `Contador: ${i}<br>`;
            }
        }
    </script>
</head>
<body>
    <button onclick="contar()">contar</button><br>
    <div id="div"></div>
</body>
</html>
