<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>deposito</title>


    <script defer>
        var saldo = 0;
        var extrato = '';

        {}

        function add(){
            var valor = Number(id_valor.value);
            saldo += valor;
            extrato = `Depósito de R$${valor} efetuado! Saldo atual: R$${saldo} <br>`
            id_saldo.innerHTML = saldo;
            id_extrato.innerHTML += extrato;
        }

        function subtract(){
            var valor = Number(id_valor.value);
            saldo -= valor;
            extrato = `Retirada de R$${valor} efetuada! Saldo atual: R$${saldo}<br>`
            id_saldo.innerHTML = saldo;
            id_extrato.innerHTML += extrato;
        }

    </script>
</head>
<body>
    

    <button id="depositar" onclick="add()">depositar</button>
    <button id="retirar" onclick="subtract()">retirar</button>
    <input type="number" id="id_valor">
    <div style="border: 2px solid #000; border-radius: 8px; padding: 10px;">
        <div style="display: flex; flex-direction: row;">
        <h1>Saldo Bancario: </h1><h1 id="id_saldo">0</h1>
        </div>
        <br>
        <h1>Estrato</h1>
        <div id="id_extrato"></div>
    </div>





</body>
</html>
